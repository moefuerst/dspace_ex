name: Mutation Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: mutation testing (OTP 28.5.0.2 / Elixir 1.20.1)

    env:
      MIX_ENV: test

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Run on the pinned toolchain (mise.toml)
      - name: Setup Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: "28.5.0.2"
          elixir-version: "1.20.1"

      - name: Restore deps and _build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28.5.0.2-1.20.1-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-28.5.0.2-1.20.1

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix muex --optimize --optimize-level conservative --fail-at 80

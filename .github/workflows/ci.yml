name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test (OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}})

    env:
      MIX_ENV: test

    strategy:
      matrix:
        include:
          - elixir: "1.18.4"
            otp: "27.3.4.13"

          - elixir: "1.19.5"
            otp: "28.5.0.2"
            lint: true

          - elixir: "1.20.1"
            otp: "28.5.0.2"

          - elixir: "1.20.1"
            otp: "29.0.2"

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Restore deps and _build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install deps
        run: mix deps.get

      - name: Remove compiled application files
        run: mix clean

      - name: Compile & lint
        run: mix compile --warnings-as-errors
        if: ${{ matrix.lint }}

      - name: Run test suite
        run: mix test

      - name: Build Docs
        run: MIX_ENV=dev mix docs
        if: ${{ matrix.lint }}

  quality:
    name: checks (OTP 29.0.2 / Elixir 1.20.1)

    env:
      MIX_ENV: test

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: "29.0.2"
          elixir-version: "1.20.1"

      - name: Restore deps and _build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-29.0.2-1.20.1-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-29.0.2-1.20.1

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused

      - name: Credo
        run: mix credo --strict

  dialyzer:
    name: dialyzer (OTP 28.5.0.2 / Elixir 1.20.1)

    env:
      MIX_ENV: test

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Run Dialyzer on the pinned toolchain (mise.toml)
      - name: Setup Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: "28.5.0.2"
          elixir-version: "1.20.1"

      - name: Restore deps and _build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-28.5.0.2-1.20.1-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-28.5.0.2-1.20.1

      - name: Restore plt cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: priv/plts
          key: deps-${{ runner.os }}-28.5.0.2-1.20.1-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-28.5.0.2-1.20.1

      - name: Install deps
        run: mix deps.get

      - name: Build PLTs
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format github
